<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研究报告 - 飞行无界</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F8FAFC;
        }

        .page {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background: #F8FAFC;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Background Decorative Circles */
        .bg-circle-1 {
            position: absolute;
            top: -200px;
            right: -100px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.06) 0%, rgba(37, 99, 235, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        .bg-circle-2 {
            position: absolute;
            bottom: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(234, 88, 12, 0.04) 0%, rgba(234, 88, 12, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Cloud Elements */
        .cloud {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            opacity: 0.82;
        }

        .cloud svg {
            width: 100%;
            height: 100%;
        }

        .cloud-large {
            top: -30px;
            right: -30px;
            width: 420px;
            height: 180px;
        }

        .cloud-medium {
            bottom: 50px;
            left: -70px;
            width: 300px;
            height: 130px;
        }

        .cloud-small {
            top: 20px;
            left: 48%;
            width: 200px;
            height: 90px;
        }

        .cloud-tiny {
            top: 48%;
            right: 60px;
            width: 170px;
            height: 75px;
        }

        /* Top Navigation */
        .top-nav {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(16px, 2.2vw, 20px) clamp(32px, 4.5vw, 64px);
            min-height: 72px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: inherit;
            text-decoration: none;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            color: #2563EB;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1) 0%, rgba(96, 165, 250, 0.18) 100%);
            border: 1px solid rgba(37, 99, 235, 0.16);
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.08);
        }

        .brand-mark svg {
            width: 20px;
            height: 20px;
        }

        .brand-name {
            font-size: 18px;
            font-weight: 800;
            color: #1E293B;
            letter-spacing: -0.3px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-link {
            font-size: 15px;
            font-weight: 500;
            color: #64748B;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #2563EB;
        }

        /* Article Content */
        .article-wrap {
            position: relative;
            z-index: 5;
            flex: 1;
            width: min(100%, 960px);
            margin: 0 auto;
            padding: clamp(36px, 6vh, 72px) clamp(32px, 4.5vw, 64px) clamp(48px, 8vh, 96px);
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .article-hero {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 760px;
        }

        .eyebrow-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(37, 99, 235, 0.06);
            border: 1px solid rgba(37, 99, 235, 0.2);
            border-radius: 9999px;
            width: fit-content;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2563EB;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .eyebrow-text {
            font-size: 12px;
            font-weight: 600;
            color: #2563EB;
            letter-spacing: 1.2px;
        }

        .article-title {
            font-size: clamp(40px, 3.6vw, 52px);
            font-weight: 800;
            color: #1E293B;
            line-height: 1.18;
            letter-spacing: -1.5px;
        }

        .article-summary {
            max-width: 680px;
            font-size: clamp(24px, 2.4vw, 32px);
            font-weight: 800;
            color: #1E293B;
            line-height: 1.28;
            letter-spacing: -0.6px;
        }

        .article-card {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            box-shadow: 0 12px 32px rgba(37, 99, 235, 0.08);
            padding: clamp(28px, 4vw, 48px);
        }

        .notice-kicker {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            margin-bottom: 18px;
            border-radius: 9999px;
            background: rgba(234, 88, 12, 0.08);
            color: #EA580C;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        .article-card h2 {
            font-size: clamp(24px, 2.4vw, 32px);
            line-height: 1.28;
            color: #1E293B;
            letter-spacing: -0.6px;
            margin-bottom: 18px;
        }

        .article-card p {
            font-size: 16px;
            line-height: 1.8;
            color: #475569;
        }

        .article-card p + p {
            margin-top: 14px;
        }

        .highlight-line {
            margin-top: 22px;
            padding: 16px 18px;
            border-radius: 12px;
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            color: #1E293B;
            font-size: 15px;
            line-height: 1.7;
        }

        .qr-section {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 24px;
            margin-top: 32px;
        }

        .qr-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 24px;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            background: linear-gradient(180deg, #FFFFFF 0%, #F8FAFC 100%);
        }

        .qr-label {
            font-size: 18px;
            font-weight: 800;
            color: #1E293B;
            letter-spacing: -0.2px;
        }

        .qr-caption {
            margin-top: 10px;
            color: #64748B;
            font-size: 14px;
            line-height: 1.6;
        }

        .qr-placeholder {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 180px;
            height: 180px;
            margin: 18px auto 2px;
            border: 2px dashed #CBD5E1;
            border-radius: 14px;
            background:
                linear-gradient(90deg, rgba(37, 99, 235, 0.06) 1px, transparent 1px),
                linear-gradient(180deg, rgba(37, 99, 235, 0.06) 1px, transparent 1px),
                #F1F5F9;
            background-size: 18px 18px;
            color: #94A3B8;
            overflow: hidden;
        }

        .qr-placeholder::before,
        .qr-placeholder::after {
            content: "";
            position: absolute;
            width: 44px;
            height: 44px;
            border: 8px solid rgba(37, 99, 235, 0.22);
            border-radius: 8px;
        }

        .qr-placeholder::before {
            top: 18px;
            left: 18px;
        }

        .qr-placeholder::after {
            right: 18px;
            bottom: 18px;
        }

        .qr-placeholder-text {
            position: relative;
            z-index: 1;
            padding: 6px 10px;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid #E2E8F0;
            color: #64748B;
            font-size: 13px;
            font-weight: 600;
        }

        .qr-image {
            display: block;
            width: 180px;
            height: 180px;
            margin: 18px auto 2px;
            border: 1px solid #E2E8F0;
            border-radius: 14px;
            object-fit: cover;
        }

        .article-footer-note {
            margin-top: 28px;
            padding-top: 22px;
            border-top: 1px solid #E2E8F0;
            color: #94A3B8;
            font-size: 13px;
            line-height: 1.7;
        }

        @media (max-width: 1024px) {
            .page {
                overflow: visible;
                overflow-x: hidden;
            }

            .article-wrap {
                width: 100%;
                padding: 32px 32px 64px;
            }
        }

        @media (max-width: 768px) {
            .top-nav {
                height: auto;
                padding: 16px 20px;
            }

            .nav-right {
                gap: 16px;
            }

            .nav-link {
                font-size: 14px;
            }

            .article-wrap {
                gap: 28px;
                padding: 24px 20px 72px;
            }

            .article-hero {
                gap: 18px;
            }

            .article-title {
                font-size: 32px;
                line-height: 40px;
                letter-spacing: -0.8px;
            }

            .article-summary {
                font-size: 16px;
                line-height: 26px;
            }

            .eyebrow-text {
                letter-spacing: 0.8px;
            }

            .qr-section {
                grid-template-columns: 1fr;
            }

            .cloud-large {
                top: -24px;
                right: -80px;
                width: 280px;
                height: 120px;
            }

            .cloud-medium {
                bottom: 24px;
                left: -80px;
                width: 200px;
                height: 86px;
            }

            .cloud-small {
                top: 86px;
                left: auto;
                right: 34px;
                width: 140px;
                height: 63px;
            }

            .cloud-tiny {
                top: 58%;
                right: -28px;
                width: 120px;
                height: 53px;
            }
        }

        @media (max-width: 480px) {
            .nav-link {
                display: none;
            }

            .article-wrap {
                padding-top: 18px;
                padding-bottom: 84px;
            }

            .eyebrow-badge {
                padding: 7px 12px;
            }

            .eyebrow-text {
                font-size: 11px;
            }

            .article-title {
                font-size: 28px;
                line-height: 36px;
            }

            .article-card {
                padding: 24px 18px;
            }

            .qr-card {
                padding: 22px 16px;
            }

            .qr-placeholder,
            .qr-image {
                width: 164px;
                height: 164px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- Background Decorative Circles -->
        <div class="bg-circle-1"></div>
        <div class="bg-circle-2"></div>

        <!-- Cloud Elements (SVG with Gaussian Blur) -->
        <div class="cloud cloud-large">
            <svg viewBox="0 0 420 180" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="blur-large">
                        <feGaussianBlur stdDeviation="8" />
                    </filter>
                </defs>
                <g filter="url(#blur-large)">
                    <ellipse cx="200" cy="138" rx="176" ry="24" fill="#BFD9FF" opacity="0.9" />
                    <ellipse cx="100" cy="111" rx="46" ry="38" fill="#CFE3FF" opacity="1" />
                    <ellipse cx="147" cy="83" rx="63" ry="52" fill="#CFE3FF" opacity="1" />
                    <ellipse cx="214" cy="69" rx="67" ry="55" fill="#E0EAFF" opacity="1" />
                    <ellipse cx="281" cy="80" rx="59" ry="48" fill="#E0EAFF" opacity="1" />
                    <ellipse cx="332" cy="97" rx="46" ry="38" fill="#F0F5FF" opacity="1" />
                    <ellipse cx="370" cy="114" rx="34" ry="28" fill="#F0F5FF" opacity="1" />
                </g>
            </svg>
        </div>

        <div class="cloud cloud-medium">
            <svg viewBox="0 0 300 130" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="blur-medium">
                        <feGaussianBlur stdDeviation="6" />
                    </filter>
                </defs>
                <g filter="url(#blur-medium)">
                    <ellipse cx="150" cy="101" rx="125" ry="18" fill="#BFD9FF" opacity="0.9" />
                    <ellipse cx="67" cy="79" rx="33" ry="29" fill="#CFE3FF" opacity="1" />
                    <ellipse cx="109" cy="58" rx="46" ry="40" fill="#E0EAFF" opacity="1" />
                    <ellipse cx="167" cy="47" rx="50" ry="43" fill="#E0EAFF" opacity="1" />
                    <ellipse cx="225" cy="58" rx="42" ry="36" fill="#F0F5FF" opacity="1" />
                    <ellipse cx="258" cy="72" rx="29" ry="25" fill="#F0F5FF" opacity="1" />
                </g>
            </svg>
        </div>

        <div class="cloud cloud-small">
            <svg viewBox="0 0 200 90" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="blur-small">
                        <feGaussianBlur stdDeviation="5" />
                    </filter>
                </defs>
                <g filter="url(#blur-small)">
                    <ellipse cx="100" cy="68" rx="83" ry="14" fill="#BFD9FF" opacity="0.9" />
                    <ellipse cx="46" cy="49" rx="23" ry="21" fill="#CFE3FF" opacity="1" />
                    <ellipse cx="75" cy="34" rx="32" ry="29" fill="#E0EAFF" opacity="1" />
                    <ellipse cx="117" cy="27" rx="35" ry="32" fill="#F0F5FF" opacity="1" />
                    <ellipse cx="154" cy="38" rx="27" ry="24" fill="#F0F5FF" opacity="1" />
                </g>
            </svg>
        </div>

        <div class="cloud cloud-tiny">
            <svg viewBox="0 0 170 75" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="blur-tiny">
                        <feGaussianBlur stdDeviation="4" />
                    </filter>
                </defs>
                <g filter="url(#blur-tiny)">
                    <ellipse cx="85" cy="56" rx="68" ry="11" fill="#BFD9FF" opacity="0.9" />
                    <ellipse cx="38" cy="41" rx="19" ry="17" fill="#CFE3FF" opacity="1" />
                    <ellipse cx="64" cy="29" rx="26" ry="23" fill="#E0EAFF" opacity="1" />
                    <ellipse cx="98" cy="23" rx="27" ry="24" fill="#F0F5FF" opacity="1" />
                    <ellipse cx="128" cy="31" rx="21" ry="19" fill="#F0F5FF" opacity="1" />
                </g>
            </svg>
        </div>

        <!-- Top Navigation -->
        <nav class="top-nav">
            <div class="nav-left">
                <a href="index.html" class="brand-link" aria-label="返回首页">
                    <span class="brand-mark" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 12.5L20 4L15.5 20L11.8 13.7L4 12.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                            <path d="M12 13.5L20 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                        </svg>
                    </span>
                    <span class="brand-name">飞行无界</span>
                </a>
            </div>
            <div class="nav-right">
                <a href="research.html" class="nav-link active" aria-current="page">研究报告</a>
                <a href="follow.html" class="nav-link">关注我们</a>
            </div>
        </nav>

        <!-- Article Content -->
        <main class="article-wrap">
            <section class="article-hero" aria-labelledby="page-title">
                <div class="eyebrow-badge">
                    <span class="pulse-dot"></span>
                    <span class="eyebrow-text">RESEARCH REPORTS</span>
                </div>
                <h1 class="article-title" id="page-title">研究报告</h1>
                <p class="article-summary">扫码关注飞书社群，获取第一手研究报告</p>
            </section>

            <article class="article-card">
                <p>飞行无界的研究报告将优先在飞书社群中发布。我们会围绕 AI 基础设施、半导体、算力产业链与相关上市公司，持续更新深度研究、数据观察与投资线索。</p>
                <p>欢迎扫码关注下方两个飞书群：话题群用于沉淀研究报告与重要更新，讨论群用于交流观点、追踪市场变化和收集问题反馈。</p>

                <div class="highlight-line">
                    建议同时关注两个群，以便及时获得完整报告、后续补充材料和社群讨论提醒。
                </div>

                <div class="qr-section" aria-label="飞书二维码">
                    <section class="qr-card">
                        <h3 class="qr-label">飞书话题群</h3>
                        <img class="qr-image" src="resources/feishu-topic-group-qr.png" alt="飞书话题群二维码" width="180" height="180">
                        <p class="qr-caption">关注研究报告发布、专题更新与精选资料沉淀。</p>
                    </section>

                    <section class="qr-card">
                        <h3 class="qr-label">飞书讨论群</h3>
                        <img class="qr-image" src="resources/feishu-discussion-group-qr.png" alt="飞书讨论群二维码" width="180" height="180">
                        <p class="qr-caption">加入实时讨论，交流研究观点、市场观察与问题反馈。</p>
                    </section>
                </div>
            </article>
        </main>
    </div>
</body>
</html>
